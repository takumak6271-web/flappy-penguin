<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>フラッピーペンギン</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: linear-gradient(135deg, #0c1e42 0%, #1a4a8a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  touch-action: none;
  user-select: none;
}

/* タイトル画面 */
#titleScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
#titleScreen h1 {
  color: #FFE566;
  font-size: 36px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
#titleScreen p {
  color: rgba(200,230,255,0.8);
  font-size: 15px;
}
#charSelect {
  display: flex;
  gap: 16px;
  margin: 8px 0;
}
.charBtn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.15s;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
}
.charBtn:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.4); }
.charBtn.selected {
  background: rgba(255,220,50,0.2);
  border-color: #FFD700;
  color: #FFD700;
  font-weight: bold;
  transform: scale(1.05);
}
.charBtn img { width: 72px; height: 72px; object-fit: contain; }
#startBtn {
  padding: 14px 48px;
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #222;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 4px 16px rgba(255,180,0,0.4);
}
#startBtn:hover { transform: scale(1.05); }
#startBtn:active { transform: scale(0.97); }
#bestScore {
  color: rgba(180,220,255,0.7);
  font-size: 15px;
}
.sectionLabel {
  color: rgba(180,220,255,0.65);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.btnRow {
  display: flex;
  gap: 8px;
}
.optBtn {
  padding: 7px 14px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all 0.13s;
}
.optBtn:hover { background: rgba(255,255,255,0.16); }
.optBtn.selected {
  background: rgba(100,200,255,0.22);
  border-color: #88ddff;
  color: #88ddff;
}
.optBtn.diff-hard.selected { border-color: #FF6B6B; color: #FF6B6B; background: rgba(255,100,100,0.18); }
.optBtn.diff-easy.selected { border-color: #88ff99; color: #88ff99; background: rgba(100,255,120,0.18); }
#achievementBanner {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(90deg,#FFD700,#FFA500);
  color: #222; font-size:14px; font-weight:bold;
  padding: 8px 22px; border-radius: 20px;
  box-shadow: 0 4px 16px rgba(255,180,0,0.5);
  z-index:9999; display:none; pointer-events:none;
  white-space:nowrap;
}

/* ゲーム画面 */
#gameScreen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100vh;
  gap: 0;
}
#canvasWrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
canvas {
  display: block;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  /* JSでサイズを動的に設定 */
}
#gameHint {
  margin-top: 8px;
  color: rgba(180,210,255,0.6);
  font-size: 13px;
}
#p2buttons {
  display: none;
  gap: 12px;
  margin-top: 10px;
  width: 100%;
  max-width: 500px;
  padding: 0 12px;
}
#p2buttons button {
  flex: 1;
  padding: 22px 0;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  transition: transform 0.08s, opacity 0.08s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
}
#p2buttons button:active { transform: scale(0.94); opacity: 0.8; }
#btnP1 { background: linear-gradient(135deg,#44bb66,#228844); color: white; }
#btnP2 { background: linear-gradient(135deg,#ee5577,#aa2244); color: white; }
</style>
</head>

  <div id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
  <div id="gameHint">クリック / スペースキー でジャンプ</div>
  <div id="p2buttons">
    <button id="btnP1">🐧 P1</button>
    <button id="btnP2">🐧 P2</button>

<script>
const imgs = [null, document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];
let selChar = 1;
let selCostume = 'none';
let selDiff = 'easy';
let selMode = 'normal';

// ---- ハイスコア (localStorage) ----
function bestKey() { return `best_${selChar}_${selDiff}_${selMode}`; }
function loadBest() { return parseInt(localStorage.getItem(bestKey()) || '0'); }
function saveBest(v) { localStorage.setItem(bestKey(), v); }

// ---- 実績 ----
const ACHIEVEMENTS = [
  { id:'first',    label:'🐧 初フライト！' },
  { id:'score10',  label:'⭐ 10点突破！' },
  { id:'score30',  label:'🌟 30点突破！' },
  { id:'score50',  label:'🏆 50点突破！' },
  { id:'score100', label:'👑 伝説の100点！' },
];
function unlocked(id) { return !!localStorage.getItem('ach_'+id); }
function checkAchievements(s) {
  const thresholds = { first:1, score10:10, score30:30, score50:50, score100:100 };
  ACHIEVEMENTS.forEach(a => {
    if (!unlocked(a.id) && s >= (thresholds[a.id]||999)) {
      localStorage.setItem('ach_'+a.id, '1');
      showAchievementBanner(a.label);
    }
  });
}
function showAchievementBanner(text) {
  const b = document.getElementById('achievementBanner');
  b.textContent = '🎉 実績解除: ' + text;
  b.style.display = 'block';
  clearTimeout(b._t);
  b._t = setTimeout(() => { b.style.display='none'; }, 2800);
}

function selectChar(n) {
  selChar = n;
  document.querySelectorAll('.charBtn').forEach(b => b.classList.remove('selected'));
  document.querySelector('[data-char="'+n+'"]').classList.add('selected');
  updateBestDisplay();
}
function selectCostume(c) {
  selCostume = c;
  document.querySelectorAll('[data-costume]').forEach(b => b.classList.remove('selected'));
  document.querySelector('[data-costume="'+c+'"]').classList.add('selected');
}
function selectDiff(d) {
  selDiff = d;
  document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('selected'));
  document.querySelector('[data-diff="'+d+'"]').classList.add('selected');
  updateBestDisplay();
}
function selectMode(m) {
  selMode = m;
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('selected'));
  document.querySelector('[data-mode="'+m+'"]').classList.add('selected');
  const hint = document.getElementById('gameHint');
  if (m === '2p') hint.textContent = 'P1: スペース/クリック  ／  P2: Wキー';
  else if (m === 'time') hint.textContent = '30秒以内に何点取れるか挑戦！';
  else hint.textContent = 'クリック / スペースキー でジャンプ';
  updateBestDisplay();
}
function updateBestDisplay() {
  const b = loadBest();
  const bs = document.getElementById('bestScore');
  const ml = {normal:'ノーマル',time:'⏱タイムアタック','2p':'👥2人対戦'}[selMode];
  const dl = {easy:'かんたん',normal:'ふつう',hard:'むずかしい'}[selDiff];
  bs.textContent = b > 0 ? `🏆 ベスト [${ml}/${dl}]: ${b}` : '';
}

// ===== ゲームロジック =====
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 360, H = 580;
C.width = W; C.height = H;

// 画面サイズに合わせてcanvasをスケール
function resizeCanvas() {
  const is2p = selMode === '2p';
  const btnH = is2p ? 80 : 0;
  const hintH = 30;
  const pad = 16;
  const availW = window.innerWidth - pad * 2;
  const availH = window.innerHeight - hintH - btnH - pad * 2;
  const scale = Math.min(availW / W, availH / H, 1.5);
  C.style.width  = Math.floor(W * scale) + 'px';
  C.style.height = Math.floor(H * scale) + 'px';
  const p2btn = document.getElementById('p2buttons');
  if (p2btn) p2btn.style.maxWidth = Math.floor(W * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

const GRAVITY  = 0.38;
const FLAP_V   = -7.8;
const PIPE_W   = 52;
const BSZ      = 52;
const BX       = 80;
const GY       = H * 0.88;

// 難易度設定
const DIFF_SETTINGS = {
  easy:   { gap: 230, baseSpd: 1.8, flap: -4.2, spdScale: 0.003, maxSpd: 2.6 },
  normal: { gap: 195, baseSpd: 2.5, flap: -4.2, spdScale: 0.008, maxSpd: 4.5 },
  hard:   { gap: 155, baseSpd: 3.2, flap: -4.2, spdScale: 0.012, maxSpd: 6.5 },
};
function diffGap()  { return DIFF_SETTINGS[selDiff].gap; }
function diffSpd()  { return DIFF_SETTINGS[selDiff].baseSpd; }
function diffFlap() { return DIFF_SETTINGS[selDiff].flap; }

let bird, bird2, pipes, gx, frame, score, score2, state, deadTimer;
let items = [];       // コイン・魚アイテム
let invincible = 0;   // 無敵残りフレーム
let timeLeft = 30;    // タイムアタック残り秒
let p2alive = true;   // 2人対戦P2生存
let particles = [];
let boss = null;           // ボス
let bossWarning = 0;       // ボス警告タイマー
let nextBossScore = 30;    // 次のボス出現スコア
let tauntTimer = 0;        // 煽りタイマー
let tauntText = '';        // 煽りセリフ
let tauntLife = 0;         // 煽り表示残り時間

// 雲
const clouds = Array.from({length:5},(_,i)=>({
  x:i*90+20, y:20+Math.random()*80, w:50+Math.random()*40, spd:0.4+Math.random()*0.3
}));

function initGame() {
  bird  = { y: H*0.42, vy: 0, angle: 0, flap: 0, alive: true, char: selChar };
  bird2 = selMode === '2p'
        ? { y: H*0.52, vy: 0, angle: 0, flap: 0, alive: true, char: (selChar % 3) + 1 }
        : null;
  pipes = []; gx = 0; frame = 0;
  score = 0; score2 = 0; deadTimer = 0;
  items = []; invincible = 0;
  timeLeft = 30;
  p2alive = selMode === '2p';
  state = 'ready'; particles = [];
  boss = null; bossWarning = 0; nextBossScore = 30;
  tauntTimer = 0; tauntText = ''; tauntLife = 0;
}

// ---- パーティクル ----
function spawnFlap(x, y) {
  for (let i = 0; i < 7; i++) {
    const angle = Math.PI * (0.8 + Math.random() * 1.4);
    const speed = 1.2 + Math.random() * 2.2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 1, decay: 0.055 + Math.random() * 0.04,
      size: 3 + Math.random() * 4,
      type: 'feather',
      color: `hsl(${200 + Math.random()*40},80%,${75+Math.random()*20}%)`,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.3
    });
  }
}

function spawnScore(x, y) {
  const colors = ['#FFD700','#FF69B4','#00FFCC','#FF6B35','#C8FF00','#FF3399'];
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: 0.025 + Math.random() * 0.025,
      size: 5 + Math.random() * 6,
      type: i % 3 === 0 ? 'star' : 'circle',
      color: colors[i % colors.length],
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2
    });
  }
  // +1 テキスト
  particles.push({ x, y: y - 10, vx: 0, vy: -1.2, life: 1, decay: 0.022, type: 'text', text: '+1' });
}

function spawnExplosion(x, y) {
  const colors = ['#FF4444','#FF8800','#FFDD00','#FF69B4','#00CCFF','#FFFFFF','#FF6B35'];
  for (let i = 0; i < 35; i++) {
    const angle = (i / 35) * Math.PI * 2 + Math.random() * 0.4;
    const speed = 2.5 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: 0.018 + Math.random() * 0.02,
      size: 4 + Math.random() * 9,
      type: Math.random() < 0.4 ? 'star' : 'circle',
      color: colors[i % colors.length],
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.4,
      gravity: 0.12
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    if (p.gravity) p.vy += p.gravity;
    p.life -= p.decay;
    if (p.rot !== undefined) p.rot += p.rotV || 0;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y);
    if (p.type === 'text') {
      ctx.font = 'bold 22px Arial';
      ctx.fillStyle = '#FFD700';
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 3;
      ctx.textAlign = 'center';
      ctx.strokeText(p.text, 0, 0);
      ctx.fillText(p.text, 0, 0);
    } else if (p.type === 'star') {
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      for (let j = 0; j < 5; j++) {
        const a = (j * 4 * Math.PI / 5) - Math.PI / 2;
        const b = (j * 4 * Math.PI / 5 + Math.PI * 2 / 5) - Math.PI / 2;
        const r1 = p.size, r2 = p.size * 0.42;
        if (j === 0) ctx.moveTo(Math.cos(a)*r1, Math.sin(a)*r1);
        else ctx.lineTo(Math.cos(a)*r1, Math.sin(a)*r1);
        ctx.lineTo(Math.cos(b)*r2, Math.sin(b)*r2);
      }
      ctx.closePath(); ctx.fill();
    } else if (p.type === 'feather') {
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.35, p.size, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function flap(player) {
  if (!player) player = 1;
  if (state === 'dead') { if (deadTimer > 40) showTitle(); return; }
  if (state === 'ready') state = 'playing';
  if (player === 1 && bird && bird.alive) {
    bird.vy = diffFlap(); bird.flap = 10;
    playFlapSound(); spawnFlap(BX, bird.y);
    // ボスに攻撃
    if (boss) damageBoss();
  }
  if (player === 2 && bird2 && bird2.alive) {
    bird2.vy = diffFlap(); bird2.flap = 10;
    playFlapSound(); spawnFlap(BX, bird2.y);
  }
}

C.addEventListener('click', () => flap(1));
C.addEventListener('touchstart', e => { e.preventDefault(); flap(1); }, {passive:false});

const btnP2 = document.getElementById('btnP2');
btnP1.addEventListener('touchstart', e => { e.preventDefault(); flap(1); }, {passive:false});
btnP1.addEventListener('click', () => flap(1));

function damageBoss() {
  if (!boss) return;
  boss.hp--;
  boss.hitFlash = 10;
  playBossHitSound();
  spawnScore(boss.x + boss.w/2, boss.y); // ヒットエフェクト
  if (boss.hp <= 0) {
    spawnExplosion(boss.x + boss.w/2, boss.y);
    spawnExplosion(boss.x + boss.w/4, boss.y - 20);
    playBossDefeatSound();
    score += 5; // ボス倒したらボーナス
    spawnScore(boss.x + boss.w/2, boss.y - 30);
    boss = null;
  }
}

function playBossHitSound() {
  try {
    const c = getAudioCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(200, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, c.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.09);
    o.start(c.currentTime); o.stop(c.currentTime + 0.1);
  } catch(e){}
}

function playBossDefeatSound() {
  try {
    const c = getAudioCtx();
    [0,0.1,0.2,0.32,0.46].forEach((t,i) => {
      const freq = [523,659,784,1047,1319][i];
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'triangle';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.2, c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+t+0.18);
      o.start(c.currentTime+t); o.stop(c.currentTime+t+0.2);
    });
  } catch(e){}
}

function spawnPipe() {
  const gap = diffGap();
  const topH = 80 + Math.random() * (GY - gap - 120);
  pipes.push({ x: W, topH, passed: false, passed2: false });
  // コインをギャップの中心に低確率で出現
  if (Math.random() < 0.55) {
    const cy = topH + gap/2 + (Math.random()-0.5)*30;
    items.push({ x: W + PIPE_W/2 + 10, y: cy, type: 'coin', collected: false, rot: 0 });
  }
  // 魚アイテムはごくまれに
  if (Math.random() < 0.12) {
    const fy = topH + gap/2 + (Math.random()-0.5)*20;
    items.push({ x: W + PIPE_W/2 + 30, y: fy, type: 'fish', collected: false, bob: 0 });
  }
}

function checkHit(b) {
  if (!b || !b.alive) return false;
  const r = BSZ * 0.36;
  if (b.y + r >= GY || b.y - r <= 2) return true;
  for (const p of pipes) {
    if (BX+r > p.x && BX-r < p.x+PIPE_W) {
      const gap = diffGap();
      if (b.y-r < p.topH || b.y+r > p.topH+gap) return true;
    }
  }
  return false;
}

function rRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function updateBird(b) {
  if (!b || !b.alive) return;
  b.vy += GRAVITY; b.y += b.vy;
  b.angle = Math.max(-25, Math.min(85, b.vy * 3.5));
  b.flap = Math.max(0, b.flap - 1);
}

function update() {
  clouds.forEach(c => { c.x -= c.spd; if(c.x+c.w<0){c.x=W+c.w; c.y=15+Math.random()*80;} });

  if (state === 'playing') {
    frame++;

    // タイムアタック: 残り時間カウント (60fps想定)
    if (selMode === 'time') {
      timeLeft = Math.max(0, timeLeft - 1/60);
      if (timeLeft <= 0) { state='dead'; deadTimer=0; stopBGM(); playGameOverSound(); return; }
    }

    updateBird(bird);
    if (selMode === '2p') updateBird(bird2);
    if (invincible > 0) invincible--;

    const d = DIFF_SETTINGS[selDiff];
    const spd = Math.min(d.baseSpd * (1 + Math.max(score,score2) * d.spdScale), d.maxSpd);
    if (frame % Math.round(105 - Math.min(Math.max(score,score2),50)) === 0) spawnPipe();

    const gap = diffGap();
    pipes.forEach(p => {
      p.x -= spd;
      // P1スコア
      if (!p.passed && p.x+PIPE_W < BX && bird.alive) {
        p.passed=true; score++;
        const b = loadBest(); if(score>b){saveBest(score);}
        playScoreSound(); spawnScore(BX, bird.y);
        checkAchievements(score);
      }
      // P2スコア (2人対戦)
      if (selMode==='2p' && !p.passed2 && p.x+PIPE_W < BX && bird2 && bird2.alive) {
        p.passed2=true; score2++;
      }
    });
    pipes = pipes.filter(p => p.x+PIPE_W > -10);
    gx -= spd; if(gx <= -W) gx += W;

    // アイテム更新
    items.forEach(it => {
      it.x -= spd;
      it.rot = (it.rot||0) + 0.06;
      it.bob = (it.bob||0) + 0.08;
      if (it.collected) return;
      // P1との当たり判定
      const dx = BX - it.x, dy = bird.alive ? bird.y - it.y : 999;
      if (Math.hypot(dx,dy) < 22) {
        it.collected = true;
        if (it.type === 'coin')  { score += 3; spawnScore(it.x, it.y); playScoreSound(); checkAchievements(score); }
        if (it.type === 'fish')  { invincible = 300; showAchievementBanner('🐟 無敵！5秒間パイプに当たらない！'); }
      }
    });
    items = items.filter(it => it.x > -20 && !it.collected);

    // 衝突判定
    // ボス出現チェック
    if (score >= nextBossScore && !boss && bossWarning === 0) {
      bossWarning = 120; // 2秒警告
    }
    if (bossWarning > 0) {
      bossWarning--;
      if (bossWarning === 0) {
        // ボス登場！（上下に動くので中央付近からスタート）
        boss = { x: W + 100, baseY: GY * 0.5, y: GY * 0.5, w: 100, h: 52, spd: 2.4, t: 0, hp: 8, hitFlash: 0 };
        nextBossScore += 30;
      }
    }
    if (boss) {
      boss.x -= boss.spd;
      boss.t += 0.03;
      // 上下にゆっくり動く（常に通れる隙間あり）
      boss.y = boss.baseY + Math.sin(boss.t) * (GY * 0.28);
      // ボスがP1に当たった（当たり判定を少し小さめに）
      if (!invincible && bird.alive &&
          BX + BSZ*0.3 > boss.x && BX - BSZ*0.3 < boss.x + boss.w &&
          bird.y + BSZ*0.3 > boss.y - boss.h/2 && bird.y - BSZ*0.3 < boss.y + boss.h/2) {
        bird.alive = false; spawnExplosion(BX, bird.y); playGameOverSound();
      }
      // P2
      if (selMode==='2p' && bird2 && bird2.alive &&
          BX + BSZ*0.3 > boss.x && BX - BSZ*0.3 < boss.x + boss.w &&
          bird2.y + BSZ*0.3 > boss.y - boss.h/2 && bird2.y - BSZ*0.3 < boss.y + boss.h/2) {
        bird2.alive = false; spawnExplosion(BX, bird2.y);
      }
      if (boss.x + boss.w < -10) boss = null; // 画面外で消える
    }

    // 煽り演出（スコア15以上で発動）
    tauntTimer++;
    if (score >= 15 && tauntLife <= 0 && tauntTimer % 280 === 0) {
      const taunts = ['楽勝〜😎','ヘーイ！','もっとこい！','余裕じゃん','ふふふ…','強すぎｗ','見てる〜？','このへいきへいき'];
      tauntText = taunts[Math.floor(Math.random() * taunts.length)];
      tauntLife = 130;
    }
    if (tauntLife > 0) tauntLife--;

    const p1hit = !invincible && bird.alive && checkHit(bird);
    const p2hit = selMode==='2p' && bird2 && bird2.alive && checkHit(bird2);
    if (p1hit) { bird.alive=false; spawnExplosion(BX, bird.y); playGameOverSound(); }
    if (p2hit) { bird2.alive=false; spawnExplosion(BX, bird2.y); }

    // ゲーム終了判定
    const gameOver2p = selMode==='2p' && !bird.alive && (!bird2 || !bird2.alive);
    const gameOver1p = selMode!=='2p' && !bird.alive;
    const timeUp = selMode==='time' && timeLeft<=0;
    if (gameOver1p || gameOver2p || timeUp) {
      state='dead'; deadTimer=0; stopBGM();
    }
  }
  if (state === 'dead') {
    deadTimer++;
    [bird, bird2].forEach(b => {
      if (!b) return;
      b.vy += GRAVITY * 0.65; b.y += b.vy; b.angle = 90;
      if (b.y > GY) { b.y = GY; b.vy = 0; }
    });
  }
  if (state === 'ready') {
    bird.y = H*0.42 + Math.sin(Date.now()*0.003)*9;
    if (bird2) bird2.y = H*0.52 + Math.sin(Date.now()*0.003+1)*9;
  }
}

function drawPipe(p) {
  const cap = PIPE_W * 0.38;
  const g = ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
  g.addColorStop(0,'#4aa8cc'); g.addColorStop(0.45,'#88daf5'); g.addColorStop(1,'#2a7899');
  // 上
  ctx.fillStyle=g; ctx.fillRect(p.x, 0, PIPE_W, p.topH);
  ctx.fillStyle='#b8f0ff'; ctx.fillRect(p.x-PIPE_W*0.07, p.topH-cap, PIPE_W*1.14, cap);
  ctx.strokeStyle='#7acce8'; ctx.lineWidth=1.5; ctx.strokeRect(p.x-PIPE_W*0.07, p.topH-cap, PIPE_W*1.14, cap);
  ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fillRect(p.x+6, 0, 7, p.topH);
  // 下
  const botY = p.topH+diffGap();
  ctx.fillStyle=g; ctx.fillRect(p.x, botY+cap, PIPE_W, H);
  ctx.fillStyle='#b8f0ff'; ctx.fillRect(p.x-PIPE_W*0.07, botY, PIPE_W*1.14, cap);
  ctx.strokeStyle='#7acce8'; ctx.lineWidth=1.5; ctx.strokeRect(p.x-PIPE_W*0.07, botY, PIPE_W*1.14, cap);
  ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fillRect(p.x+6, botY+cap, 7, H);
}

// 時間帯に応じた空の色
function getSkyColors(s) {
  if (s >= 50) return [['0','#0d0020'],['0.4','#1a0050'],['0.7','#003322'],['1','#001a33']]; // オーロラ夜
  if (s >= 25) return [['0','#1a6aaa'],['0.5','#4a90d0'],['1','#88bbee']]; // 昼
  if (s >= 10) return [['0','#1a2a5a'],['0.4','#c06030'],['0.7','#e09060'],['1','#f0c080']]; // 夜明け
  return [['0','#0c1e42'],['0.6','#1a4a8a'],['1','#2a6abf']]; // 夜
}

function drawSky(s) {
  const sky = ctx.createLinearGradient(0,0,0,GY);
  getSkyColors(s).forEach(([pos,col]) => sky.addColorStop(parseFloat(pos), col));
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // オーロラ (score>=50)
  if (s >= 50) {
    const t = Date.now() * 0.001;
    for (let i=0;i<3;i++) {
      const gr = ctx.createLinearGradient(0,50+i*40,0,150+i*40);
      gr.addColorStop(0,'rgba(0,255,150,0)');
      gr.addColorStop(0.5,`rgba(${i===0?'0,255,150':i===1?'150,0,255':'0,150,255'},0.12)`);
      gr.addColorStop(1,'rgba(0,255,150,0)');
      ctx.fillStyle=gr;
      ctx.beginPath();
      for(let x=0;x<=W;x+=5) {
        const y = 80+i*35 + Math.sin(x*0.02+t+i)*20;
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.lineTo(W,0); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
    }
  }
  // 星（夜・夜明け）
  if (s < 25) {
    const starAlpha = s < 10 ? 0.7 : 0.3;
    for(let i=0;i<35;i++){
      ctx.fillStyle=`rgba(255,255,255,${starAlpha * (0.4+((i*7)%10)/15)})`;
      ctx.fillRect(((i*137+71)%W)|0, ((i*89+23)%110)|0, 1+(i%3===0?1:0), 1+(i%3===0?1:0));
    }
  }
}

// アイテム描画
function drawBoss(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  const t = Date.now() * 0.003;
  const bob = Math.sin(t) * 5;
  ctx.translate(0, bob);

  // ヒットフラッシュ
  if (b.hitFlash > 0) { b.hitFlash--; ctx.globalAlpha = 0.5; }

  // クジラ本体
  const g = ctx.createLinearGradient(0, -b.h/2, 0, b.h/2);
  g.addColorStop(0, '#2255AA'); g.addColorStop(1, '#113377');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, b.w/2, b.h/2, 0, 0, Math.PI*2);
  ctx.fill();

  // お腹（白）
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(b.w*0.05, b.h*0.1, b.w*0.28, b.h*0.28, 0, 0, Math.PI*2);
  ctx.fill();

  // 尻尾
  ctx.fillStyle = '#113377';
  ctx.beginPath();
  ctx.moveTo(b.w/2, 0);
  ctx.lineTo(b.w/2 + 30, -22);
  ctx.lineTo(b.w/2 + 30, 22);
  ctx.closePath(); ctx.fill();

  // 目
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(-b.w*0.28, -b.h*0.12, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-b.w*0.28, -b.h*0.12, 4, 0, Math.PI*2); ctx.fill();

  // 潮吹き
  if (Math.sin(t * 2) > 0.6) {
    ctx.strokeStyle = 'rgba(100,200,255,0.7)';
    ctx.lineWidth = 3;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(-b.w*0.3 + i*8, -b.h/2);
      ctx.lineTo(-b.w*0.3 + i*12, -b.h/2 - 30 - Math.abs(i)*10);
      ctx.stroke();
    }
  }

  // 「じゃまじゃま〜！」セリフ
  if (Math.sin(t) > 0.7) {
    ctx.fillStyle = 'white';
    ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
    rRect(-b.w*0.2 - 40, -b.h/2 - 38, 100, 26, 8); ctx.fill();
    ctx.fillStyle = '#2255AA';
    ctx.fillText('じゃまじゃま〜！', -b.w*0.2 + 10, -b.h/2 - 20);
  }

  // HPバー
  ctx.globalAlpha = 1;
  const barW = b.w * 0.9, barH = 7;
  const barX = -barW/2, barY = -b.h/2 - 14;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  rRect(barX-1, barY-1, barW+2, barH+2, 3); ctx.fill();
  ctx.fillStyle = b.hp > 4 ? '#44FF66' : b.hp > 2 ? '#FFAA00' : '#FF3333';
  rRect(barX, barY, barW * (b.hp/8), barH, 3); ctx.fill();

  ctx.restore();
}

function drawItems() {
  items.forEach(it => {
    if (it.collected) return;
    ctx.save();
    ctx.translate(it.x, it.y + Math.sin(it.bob||0)*4);
    if (it.type === 'coin') {
      ctx.rotate(it.rot||0);
      // コイン（金色の円）
      const gr = ctx.createRadialGradient(-3,-3,1,0,0,10);
      gr.addColorStop(0,'#FFEE44'); gr.addColorStop(1,'#CC8800');
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.ellipse(0,0,10,10,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#AA6600'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle='#AA6600'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
      ctx.fillText('¥',0,3);
      // +3 ラベル
      ctx.fillStyle='rgba(255,220,0,0.8)'; ctx.font='bold 8px Arial';
      ctx.fillText('+3',0,20);
    } else if (it.type === 'fish') {
      // 魚（青い魚の形）
      ctx.fillStyle='#66DDFF';
      ctx.beginPath();
      ctx.ellipse(0,0,14,8,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#33AACC';
      ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(22,-7); ctx.lineTo(22,7); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#003366'; ctx.beginPath(); ctx.arc(-6,-2,2,0,Math.PI*2); ctx.fill();
      // 無敵ラベル
      ctx.fillStyle='rgba(100,255,255,0.9)'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
      ctx.fillText('無敵!',0,20);
    }
    ctx.restore();
  });
}

// ペンギン描画（コスチューム付き）
function drawBirdSprite(b, charIdx) {
  if (!b) return;
  const img = imgs[charIdx];
  if (!img || !img.complete) return;
  ctx.save();
  ctx.translate(BX, b.y);
  if (!b.alive) { ctx.globalAlpha = 0.4; }
  // 無敵中は点滅
  if (invincible > 0 && b === bird && Math.floor(Date.now()/80)%2===0) { ctx.globalAlpha = 0.5; }
  ctx.rotate(Math.PI / 2);
  ctx.rotate(b.angle * Math.PI / 180 * 0.5);
  const sc = b.flap > 0 ? 1.08 : 1.0;
  ctx.scale(sc, sc);
  ctx.drawImage(img, -BSZ/2, -BSZ/2, BSZ, BSZ);

  // コスチューム
  if (selCostume === 'santa') {
    // サンタ帽（赤三角）
    ctx.fillStyle='#CC1111';
    ctx.beginPath(); ctx.moveTo(-4,-BSZ/2-2); ctx.lineTo(14,-BSZ/2-2); ctx.lineTo(5,-BSZ/2-18); ctx.closePath(); ctx.fill();
    ctx.fillStyle='white';
    ctx.fillRect(-6,-BSZ/2-4,22,5);
    ctx.beginPath(); ctx.arc(5,-BSZ/2-18,3,0,Math.PI*2); ctx.fill();
  } else if (selCostume === 'glasses') {
    // サングラス
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.beginPath(); ctx.ellipse(-2,-8,7,5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10,-8,7,5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(4,-8); ctx.lineTo(3,-8); ctx.stroke();
  }
  ctx.restore();
}

function render() {
  // 空（時間帯）
  drawSky(score);

  // 雲
  clouds.forEach(c => {
    ctx.fillStyle='rgba(255,255,255,0.09)';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w,c.w*0.44,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.3,c.y-c.w*0.14,c.w*0.58,c.w*0.36,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*0.26,c.y-c.w*0.1,c.w*0.48,c.w*0.30,0,0,Math.PI*2); ctx.fill();
  });

  pipes.forEach(drawPipe);

  // アイテム
  drawItems();

  // 海
  const sea = ctx.createLinearGradient(0,GY-30,0,GY);
  sea.addColorStop(0,'#1a5a90'); sea.addColorStop(1,'#0a2844');
  ctx.fillStyle=sea; ctx.fillRect(0,GY-30,W,30);

  // 地面
  const ice = ctx.createLinearGradient(0,GY,0,H);
  ice.addColorStop(0,'#c8ecfc'); ice.addColorStop(0.3,'#e8f8ff'); ice.addColorStop(1,'#88c8e8');
  ctx.fillStyle=ice; ctx.fillRect(0,GY,W,H-GY);
  ctx.strokeStyle='rgba(140,210,240,0.4)'; ctx.lineWidth=1;
  for(let gxi=(gx%55)-55; gxi<W; gxi+=55){
    ctx.beginPath(); ctx.moveTo(gxi+8,GY+4); ctx.lineTo(gxi+28,GY+13); ctx.lineTo(gxi+48,GY+5); ctx.stroke();
  }

  // ボス描画
  if (boss) drawBoss(boss);

  // 鳥 P2 (behind P1)
  if (selMode === '2p' && bird2) drawBirdSprite(bird2, (selChar % 3) + 1);
  // 鳥 P1
  if (bird) drawBirdSprite(bird, selChar);

  // 煽り吹き出し
  if (tauntLife > 0 && bird && bird.alive) {
    const alpha = Math.min(1, tauntLife / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 15px Arial';
    const tw = ctx.measureText(tauntText).width + 16;
    const tx = BX + 30, ty = bird.y - 40;
    ctx.fillStyle = 'white';
    rRect(tx - 8, ty - 20, tw, 28, 8); ctx.fill();
    ctx.fillStyle = '#FF6699';
    ctx.textAlign = 'left';
    ctx.fillText(tauntText, tx, ty - 1);
    // しっぽ三角
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.moveTo(tx, ty+8); ctx.lineTo(tx-12, ty+16); ctx.lineTo(tx+4, ty+8); ctx.fill();
    ctx.restore();
  }

  // ボス警告
  if (bossWarning > 0) {
    const flash = Math.floor(Date.now()/150)%2===0;
    if (flash) {
      ctx.fillStyle = 'rgba(255,0,0,0.18)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FF3333';
      ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
      ctx.fillText('⚠️ ボス来る！', W/2, H/2);
    }
  }

  // パーティクル
  drawParticles();

  // スコア表示
  ctx.textAlign='center';
  if (selMode === '2p') {
    ctx.font='bold 28px Arial';
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=4;
    ctx.strokeText('P1: '+score, W*0.28, 55); ctx.fillStyle='#88FFAA'; ctx.fillText('P1: '+score, W*0.28, 55);
    ctx.strokeText('P2: '+score2, W*0.72, 55); ctx.fillStyle='#FF88AA'; ctx.fillText('P2: '+score2, W*0.72, 55);
  } else {
    ctx.font='bold 52px Arial';
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=5;
    ctx.strokeText(score, W/2, 65); ctx.fillStyle='white'; ctx.fillText(score, W/2, 65);
  }

  // タイムアタック残り時間
  if (selMode === 'time' && state === 'playing') {
    const t = Math.ceil(timeLeft);
    const col = timeLeft < 10 ? '#FF4455' : '#FFE566';
    ctx.font = 'bold 20px Arial'; ctx.textAlign = 'right';
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=3;
    ctx.strokeText('⏱ '+t+'s', W-10, 30); ctx.fillStyle=col; ctx.fillText('⏱ '+t+'s', W-10, 30);
  }

  // 無敵インジケータ
  if (invincible > 0) {
    ctx.fillStyle='rgba(100,255,255,0.85)'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
    ctx.fillText('🐟 無敵: '+Math.ceil(invincible/60)+'s', W/2, H*0.15);
  }

  // READY
  if (state === 'ready') {
    const p = 0.55+0.45*Math.sin(Date.now()*0.006);
    ctx.fillStyle='rgba(255,255,255,'+p+')';
    ctx.font='bold 26px Arial'; ctx.textAlign='center';
    const msg = selMode==='2p' ? 'スペース or Wキーでスタート！' : 'クリックでスタート！';
    ctx.fillText(msg, W/2, H*0.23);
  }

  // DEAD / GAME OVER画面
  if (state === 'dead' && deadTimer > 38) {
    ctx.fillStyle='rgba(0,0,0,0.68)';
    rRect(W*0.07, H*0.22, W*0.86, H*0.48, 18); ctx.fill();
    ctx.strokeStyle='rgba(255,200,0,0.55)'; ctx.lineWidth=2;
    rRect(W*0.07, H*0.22, W*0.86, H*0.48, 18); ctx.stroke();
    ctx.textAlign='center';

    if (selMode === '2p') {
      const winner = (!bird2 || !bird2.alive) && bird.alive ? 'P1' : (!bird.alive) && bird2 && bird2.alive ? 'P2' : score >= score2 ? 'P1' : 'P2';
      ctx.fillStyle='#FFD700'; ctx.font='bold 32px Arial';
      ctx.fillText(winner+' の勝ち！🎉', W/2, H*0.32);
      ctx.fillStyle='#88FFAA'; ctx.font='bold 22px Arial'; ctx.fillText('P1: '+score+' 点', W/2, H*0.42);
      ctx.fillStyle='#FF88AA'; ctx.font='bold 22px Arial'; ctx.fillText('P2: '+score2+' 点', W/2, H*0.50);
    } else {
      ctx.fillStyle='#FF4455'; ctx.font='bold 36px Arial';
      ctx.fillText(selMode==='time'?'TIME UP!':'GAME OVER', W/2, H*0.32);
      ctx.fillStyle='white'; ctx.font='bold 26px Arial';
      ctx.fillText('スコア: '+score, W/2, H*0.41);
      const b = loadBest();
      ctx.fillStyle='#FFD700'; ctx.font='20px Arial';
      ctx.fillText('🏆 ベスト: '+b, W/2, H*0.49);
      // 空模様コメント
      const comment = score>=50?'👑 伝説！':score>=30?'🌟 すごい！':score>=10?'⭐ いいね！':'🐧 もう一度！';
      ctx.fillStyle='rgba(200,230,255,0.9)'; ctx.font='bold 18px Arial';
      ctx.fillText(comment, W/2, H*0.565);
    }
    const p2=0.5+0.5*Math.sin(Date.now()*0.005);
    ctx.fillStyle='rgba(255,228,80,'+p2+')';
    ctx.font='bold 18px Arial'; ctx.textAlign='center';
    ctx.fillText('クリックでタイトルへ', W/2, H*0.645);
  }
}

let loopStarted = false;
let prev=0;
function loop(ts){
  const dt=Math.min(ts-prev,50); prev=ts;
  update(); updateParticles(); render();
  requestAnimationFrame(loop);
}

// ===================== サウンド =====================
let audioCtx = null;
let bgmNodes = [];
let bgmPlaying = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// フラップ音（可愛いペンギンの鳴き声）
function playFlapSound() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // キャラによって微妙に音程を変える
    const pitchMap = { 1: 1.0, 2: 0.82, 3: 1.18 };
    const pitch = pitchMap[selChar] || 1.0;

    // 2回鳴き「クエックエッ」っぽく
    [0, 0.13].forEach(offset => {
      // メイン音（鼻にかかった丸い音）
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator(); // 倍音で厚み
      const gain1 = ctx.createGain();
      const gain2 = ctx.createGain();
      osc1.connect(gain1); gain1.connect(ctx.destination);
      osc2.connect(gain2); gain2.connect(ctx.destination);

      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(480 * pitch, now + offset);
      osc1.frequency.exponentialRampToValueAtTime(620 * pitch, now + offset + 0.03);
      osc1.frequency.exponentialRampToValueAtTime(520 * pitch, now + offset + 0.09);
      gain1.gain.setValueAtTime(0, now + offset);
      gain1.gain.linearRampToValueAtTime(0.22, now + offset + 0.015);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.10);
      osc1.start(now + offset); osc1.stop(now + offset + 0.11);

      // 倍音（かわいさ追加）
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(960 * pitch, now + offset);
      osc2.frequency.exponentialRampToValueAtTime(1100 * pitch, now + offset + 0.03);
      osc2.frequency.exponentialRampToValueAtTime(880 * pitch, now + offset + 0.09);
      gain2.gain.setValueAtTime(0, now + offset);
      gain2.gain.linearRampToValueAtTime(0.07, now + offset + 0.015);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.09);
      osc2.start(now + offset); osc2.stop(now + offset + 0.10);
    });
  } catch(e){}
}

// ゲームオーバー音
function playGameOverSound() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const pitch = {1:1.0, 2:0.82, 3:1.18}[selChar] || 1.0;

    // ピィーーーー（高音から徐々に下がって消える）
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400 * pitch, now);
    osc.frequency.exponentialRampToValueAtTime(600 * pitch, now + 0.8);
    gain.gain.setValueAtTime(0.30, now);
    gain.gain.setValueAtTime(0.28, now + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
    osc.start(now); osc.stop(now + 0.9);

    // 倍音で厚み
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(700 * pitch, now);
    osc2.frequency.exponentialRampToValueAtTime(300 * pitch, now + 0.8);
    gain2.gain.setValueAtTime(0.12, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc2.start(now); osc2.stop(now + 0.8);
  } catch(e){}
}

// スコア獲得音
function playScoreSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
  } catch(e){}
}

// BGM（軽快なループ）
function startBGM() {
  if (bgmPlaying) return;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    bgmPlaying = true;

    // BPM 128, 1拍 = 0.469s
    const bpm = 128;
    const beat = 60 / bpm;

    // メロディ音符: [音程(Hz), 長さ(拍), 開始(拍)]
    const melody = [
      [523,0.5,0],[659,0.5,0.5],[784,0.5,1],[1047,0.5,1.5],
      [988,0.25,2],[880,0.25,2.25],[784,0.5,2.5],[659,0.5,3],
      [523,0.5,3.5],[659,0.25,4],[784,0.25,4.25],[880,0.5,4.5],[1047,0.5,5],
      [988,0.5,5.5],[880,0.5,6],[784,1,6.5],
      [659,0.5,8],[523,0.5,8.5],[440,0.5,9],[392,0.5,9.5],
      [440,0.25,10],[523,0.25,10.25],[659,0.5,10.5],[784,0.5,11],
      [880,0.5,11.5],[784,0.5,12],[659,0.5,12.5],[523,0.5,13],
      [440,1,13.5],[392,0.5,14.5],[440,0.5,15],
    ];
    const loopBeats = 16;

    // ベースライン
    const bass = [
      [131,0.5,0],[131,0.5,1],[147,0.5,2],[131,0.5,3],
      [117,0.5,4],[117,0.5,5],[98,0.5,6],[98,0.5,7],
      [110,0.5,8],[110,0.5,9],[117,0.5,10],[123,0.5,11],
      [131,0.5,12],[110,0.5,13],[98,0.5,14],[87,0.5,15],
    ];

    let loopCount = 0;
    function scheduleLoop() {
      if (!bgmPlaying) return;
      const loopStart = ctx.currentTime + 0.02;
      const dur = loopBeats * beat;

      melody.forEach(([freq, len, start]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        const t = loopStart + start * beat;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.1, t + 0.02);
        gain.gain.setValueAtTime(0.1, t + len * beat - 0.04);
        gain.gain.linearRampToValueAtTime(0, t + len * beat);
        osc.start(t); osc.stop(t + len * beat + 0.01);
        bgmNodes.push(osc);
      });

      bass.forEach(([freq, len, start]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        const t = loopStart + start * beat;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.setValueAtTime(0.12, t + len * beat - 0.06);
        gain.gain.linearRampToValueAtTime(0, t + len * beat);
        osc.start(t); osc.stop(t + len * beat + 0.01);
        bgmNodes.push(osc);
      });

      // 次のループをタイマーでスケジュール
      setTimeout(() => { if (bgmPlaying) scheduleLoop(); }, (dur - 0.1) * 1000);
    }
    scheduleLoop();
  } catch(e){}
}

function stopBGM() {
  bgmPlaying = false;
  bgmNodes.forEach(n => { try { n.stop(); } catch(e){} });
  bgmNodes = [];
}
